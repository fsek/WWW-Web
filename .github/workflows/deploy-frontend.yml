name: Deploy Frontend
run-name: Deploy Frontend to ${{ github.event.inputs.target || 'unknown' }}

on:
  workflow_dispatch:
    inputs:
      target:
        description: 'Which environment to deploy to'
        required: true
        default: 'stage'
        type: choice
        options:
          - stage
          - prod

env:
  IMAGE_NAME: ${{ github.repository }}
  REGISTRY: ghcr.io

jobs:
  deploy:
    runs-on: ubuntu-latest

    permissions:
      contents: read
      packages: write
      attestations: write
      id-token: write

    steps:
      - name: Checkout main branch
        uses: actions/checkout@v6
        with:
          ref: main
          fetch-depth: 0

      - name: Generate Deployment Context
        id: ctx
        run: |
          TARGET="${{ github.event.inputs.target }}"
          SHORT_SHA=$(git rev-parse --short HEAD)
          COMMIT_MSG=$(git log -1 --pretty=%B | head -n 1)
          
          echo "target=$TARGET" >> $GITHUB_OUTPUT
          echo "sha_short=$SHORT_SHA" >> $GITHUB_OUTPUT
          
          # Write to GitHub Action UI Summary for easy visibility
          echo "### Deployment Summary" >> $GITHUB_STEP_SUMMARY
          echo "- **Environment:** \`$TARGET\`" >> $GITHUB_STEP_SUMMARY
          echo "- **Commit:** [\`$SHORT_SHA\`](https://github.com/${{ github.repository }}/commit/$SHORT_SHA)" >> $GITHUB_STEP_SUMMARY
          echo "- **Message:** $COMMIT_MSG" >> $GITHUB_STEP_SUMMARY
          echo "- **Triggered by:** @${{ github.actor }}" >> $GITHUB_STEP_SUMMARY

      - name: Set environment URLs
        run: |
          if [ "${{ steps.ctx.outputs.target }}" = "stage" ]; then
            echo "OPENAPI_JSON_URL=${{ secrets.OPENAPI_JSON_URL_STAGE }}" >> $GITHUB_ENV
            echo "API_BASE_URL=https://stage.backend.fsektionen.se"     >> $GITHUB_ENV
          else
            echo "OPENAPI_JSON_URL=${{ secrets.OPENAPI_JSON_URL_PROD }}"  >> $GITHUB_ENV
            echo "API_BASE_URL=https://backend.fsektionen.se"            >> $GITHUB_ENV
          fi

      - name: Download OpenAPI spec
        run: |
          mkdir -p src/api
          curl -fSL "$OPENAPI_JSON_URL" -o src/api/openapi.json

      - name: Install Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Generate API client
        run: bun run generate-api src/api/openapi.json

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata (raw tags)
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=${{ steps.ctx.outputs.target }}
            type=raw,value=${{ steps.ctx.outputs.target }}-${{ steps.ctx.outputs.sha_short }}

      - name: Build and push Docker image
        id: build-image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            API_BASE_URL=${{ env.API_BASE_URL }}
            NEXT_PUBLIC_APP_VERSION=${{ steps.ctx.outputs.sha_short }}

      - name: Generate artifact attestation
        uses: actions/attest-build-provenance@v3
        with:
          subject-name: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          subject-digest: ${{ steps.build-image.outputs.digest }}
          push-to-registry: true